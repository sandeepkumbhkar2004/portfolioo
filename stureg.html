<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Online School Application</title>
    <link rel="stylesheet" href="stureg.css">
</head>
<body>

    <div class="form-container">
        <!-- Main Application Title -->
        <h2 class="app-title">Online School Application</h2>
        
        <!-- Registration Form -->
        <form action="#" method="POST" class="admission-form">
            <div class="form-header">Candidate Details Form</div>
            
            <!-- Personal Details Field -->
            <div class="form-group">
                <label for="fullName">Personal Details full</label>
                <input type="text" id="fullName" name="fullName" placeholder="Enter full name" required>
            </div>

            <!-- Birthdate Field -->
            <div class="form-group">
                <label for="birthdate">Birthdate</label>
                <input type="date" id="birthdate" name="birthdate" required>
            </div>

            <!-- Permanent Address Field -->
            <div class="form-group">
                <label for="address">Permanent Address</label>
                <textarea id="address" name="address" rows="2" placeholder="Enter permanent address" required></textarea>
            </div>

            <!-- Mobile Number Field -->
            <div class="form-group">
                <label for="mobile">Mobile Number</label>
                <input type="tel" id="mobile" name="mobile" pattern="[0-9]{10}" placeholder="Enter 10-digit number" required>
            </div>

            <!-- Blood Group Field -->
            <div class="form-group">
                <label for="bloodGroup">Blood Group</label>
                <select id="bloodGroup" name="bloodGroup" required>
                    <option value="" disabled selected>Select blood group</option>
                    <option value="A+">A+</option>
                    <option value="A-">A-</option>
                    <option value="B+">B+</option>
                    <option value="B-">B-</option>
                    <option value="O+">O+</option>
                    <option value="O-">O-</option>
                    <option value="AB+">AB+</option>
                    <option value="AB-">AB-</option>
                </select>
            </div>

            <!-- Submit Button -->
            <button type="submit" class="submit-btn">Submit Application</button>
        </form>
    </div>

</body>
</html>
